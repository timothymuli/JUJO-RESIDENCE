# Deploy on Render: Dashboard → New → Blueprint → connect this repo.
# Or: New Web Service → connect GitHub → Render reads this file automatically.
services:
  - type: web
    name: jujo-residence
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: OTP_SALT
        generateValue: true
      - key: SMS_MOCK
        value: "1"
      - key: MPESA_MOCK
        value: "1"
      - key: DISABLE_REMINDERS
        value: "0"
      - key: REMINDER_TZ
        value: Africa/Nairobi
      - key: ADMIN_PASSWORD
        sync: false
      - key: SUPERADMIN_EMAILS
        value: timothymuli76@gmail.com
      - key: STAFF_PASSWORD
        sync: false
      - key: LANDLORD_PASSWORD
        sync: false
